name: AgentOps Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-lock.txt
          python -m pip install --no-deps -e backend

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Backend tests
        run: python -m pytest

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Run evaluation suite
        run: |
          python -m app.evaluation.cli run \
            --suite mvp-demo-suite@v2 \
            --version ci \
            --output .agentops/eval-runs/ci.json

      - name: Compare against baseline
        run: |
          python -m app.evaluation.cli compare \
            --baseline backend/app/evaluation/baselines/mvp-demo-suite@v2.json \
            --candidate .agentops/eval-runs/ci.json \
            --fail-on-p0-regression

      - name: Upload AgentOps artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentops-quality-artifacts
          path: |
            .agentops/eval-runs/ci.json
            .agentops/regression-reports/*.json
          retention-days: 30
          if-no-files-found: ignore
